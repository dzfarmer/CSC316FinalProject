<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Behavioral Balance Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/radar.css" />
  <style>
    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", sans-serif;
      background: #f9f4ef;
      padding: 24px;
      color: #3d2c26;
    }
    #viz5 {
      max-width: 1180px;
      margin: 0 auto;
    }
    #viz5 .mini-chart-card {
      background: #fffdfb;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(92, 64, 51, 0.08);
      padding: 22px;
    }
    #viz5 .mini-chart-header {
      margin-bottom: 18px;
    }
    #viz5 .mini-badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(111,133,255,0.12);
      color: #6f85ff;
      font-weight: 800;
      font-size: 0.9rem;
    }
    #viz5 .mini-chart-header h3 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }
    #viz5 .mini-chart-header p {
      margin: 0;
      color: rgba(61, 44, 38, 0.72);
      font-weight: 600;
    }
    #viz5 .radar-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    #viz5 .radar-notes {
      background: #f3ddd6;
      border: 3px solid #7a5a45;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.08);
    }
    #viz5 .toggle-header {
      font-weight: 800;
      margin-bottom: 10px;
      color: #3d2c26;
    }
    #viz5 .controls-hint {
      margin-top: 10px;
      color: rgba(61, 44, 38, 0.8);
      font-size: 0.92rem;
      font-weight: 600;
    }
    #viz5 .radar-toggle-btn,
    #viz5 .radar-group-btn {
      font: inherit;
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: #fff8f3;
      color: #3d2c26;
      font-weight: 800;
      cursor: pointer;
      box-shadow: inset 0 0 0 2px #8b6a55;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    #viz5 .radar-toggle-btn.active,
    #viz5 .radar-group-btn.active {
      background: #cfe5ff;
      color: #2d334d;
      box-shadow: inset 0 0 0 2px #7b8cff;
    }
    #viz5 .radar-stage {
      background: rgba(255,255,255,0.9);
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 10px 24px rgba(31,36,48,0.08);
      border: 1px solid rgba(31,36,48,0.06);
    }
  </style>
</head>
<body>
  <div id="viz5">
    <div class="mini-chart-card">
      <div class="mini-chart-header">
        <div class="mini-badge">Main message</div>
        <h3>Sleep is behavioral balance</h3>
        <p>This radar chart summarizes the project’s key dimensions.</p>
      </div>

      <div class="radar-wrap">
        <div class="radar-notes">
          <div class="toggle-header">✨ Cluster Toggle</div>
          <div id="radarClusterButtons" class="radar-cluster-buttons"></div>
          <div id="radarGroupButtons" class="radar-group-buttons"></div>
          <div class="controls-hint">Hover a cluster on the radar to see details</div>
          <div id="radarClusterLegend" class="radar-cluster-legend"></div>
        </div>

        <div class="radar-stage">
          <svg id="sleep-radar-chart" width="980" height="560" role="img" aria-label="Sleep behavior radar chart"></svg>
        </div>
      </div>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="js/sleepRadar.js"></script>
</body>
</html>
